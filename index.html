<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SyncWatch - Совместный просмотр YouTube, Rutube, VK Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        .room-card, .search-section, .chat-container {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .room-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #ff0000;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button.secondary {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
        }
        button.platform-btn {
            padding: 8px 16px;
            font-size: 12px;
        }
        button.platform-btn.active {
            background: linear-gradient(135deg, #00ff00, #00cc00);
        }
        .room-info {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        .platform-selector {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .player-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            min-height: 400px;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .player-wrapper iframe,
        .player-wrapper #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .videos-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .video-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-item:hover {
            transform: translateX(5px);
            background: #3a3a3a;
        }
        .video-thumb {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            object-fit: cover;
        }
        .video-title {
            font-size: 14px;
            font-weight: bold;
        }
        .video-channel {
            font-size: 12px;
            color: #888;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
        }
        .chat-header {
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }
        .message {
            margin-bottom: 12px;
        }
        .message .username {
            color: #ff6b6b;
            font-weight: bold;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sync-status {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-badge.connected {
            background: #00ff00;
            animation: pulse 1s infinite;
        }
        .status-badge.disconnected {
            background: #ff0000;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .users-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .user-badge {
            background: #ff0000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .user-badge.creator {
            background: #ffaa00;
            color: #000;
        }
        .qr-container {
            background: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .qr-container.show {
            display: block;
        }
        .qr-code canvas {
            width: 200px;
            height: 200px;
            margin: 10px auto;
        }
        .collapsible {
            cursor: pointer;
            margin-bottom: 10px;
        }
        .collapsible:after {
            content: ' ▼';
            font-size: 12px;
        }
        .collapsible.collapsed:after {
            content: ' ▶';
        }
        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .collapsible-content.collapsed {
            max-height: 0;
        }
        .creator-only {
            background: rgba(255, 170, 0, 0.2);
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }
        .creator-label {
            font-size: 11px;
            color: #ffaa00;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 SyncWatch</h1>
            <p>Смотрите YouTube, Rutube, VK Video вместе с друзьями</p>
        </div>

        <div class="main-grid">
            <div class="left-column">
                <div class="room-card">
                    <div class="room-controls">
                        <input type="text" id="roomIdInput" placeholder="ID комнаты">
                        <button onclick="joinRoom()">🔗 Присоединиться</button>
                        <button onclick="createRoom()" class="secondary">✨ Создать комнату</button>
                    </div>
                    <div id="roomInfo" style="display: none;">
                        <div class="room-info">
                            <div style="display: flex; justify-content: space-between;">
                                <div><strong>🏠 Комната:</strong> <span id="currentRoomId"></span></div>
                                <div><strong>👥 Участники:</strong> <span id="userCount">1</span></div>
                            </div>
                            <div class="users-list" id="usersList"></div>
                            
                            <!-- Панель выбора платформы (только для создателя) -->
                            <div id="platformSelector" style="display: none;">
                                <div class="platform-selector">
                                    <button onclick="changePlatform('youtube')" id="btn-youtube" class="platform-btn">▶️ YouTube</button>
                                    <button onclick="changePlatform('rutube')" id="btn-rutube" class="platform-btn">🎬 Rutube</button>
                                    <button onclick="changePlatform('vk')" id="btn-vk" class="platform-btn">📱 VK Video</button>
                                </div>
                            </div>
                            
                            <div class="qr-container" id="qrContainer">
                                <div>📱 Отсканируйте QR-код</div>
                                <div class="qr-code" id="qrCode"></div>
                                <button onclick="downloadQR()" class="secondary">💾 Скачать QR</button>
                                <div style="font-size: 11px; margin-top: 10px;">Ссылка: <span id="roomLinkShort"></span></div>
                            </div>
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button onclick="showQRCode()" class="secondary">📱 QR-код</button>
                                <button onclick="copyRoomLink()" class="secondary">📋 Ссылка</button>
                                <button onclick="leaveRoom()" class="secondary">🚪 Выйти</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="player-container">
                    <div class="player-wrapper" id="player-wrapper">
                        <div id="player"></div>
                    </div>
                </div>

                <div class="sync-status" id="syncStatus">
                    <span class="status-badge disconnected" id="statusBadge"></span>
                    <span id="statusText">Подключение...</span>
                </div>
            </div>

            <div class="right-column">
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск видео..." onkeypress="if(event.key==='Enter') searchVideos()">
                        <button onclick="searchVideos()">🔍 Поиск</button>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>📺 Результаты поиска</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="searchResults"></div>
                    </div>
                </div>

                <div class="chat-container">
                    <div class="chat-header">💬 Чат</div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message"><span class="text">💡 Подключитесь к комнате</span></div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script>
        // ========== ПЕРЕМЕННЫЕ ==========
        let currentPlatform = 'youtube';
        let isCreator = false;
        let player = null;
        let socket = null;
        let currentRoom = null;
        let userId = 'user_' + Math.random().toString(36).substr(2, 9);
        let userName = 'User_' + Math.floor(Math.random() * 1000);
        let isInternalAction = false;
        let currentVideoId = 'dQw4w9WgXcQ';
        
        // Rutube плеер переменные
        let rutubeIframe = null;
        
        // VK плеер переменные
        let vkPlayer = null;
        
        const YOUTUBE_API_KEY = 'AIzaSyD2U_rIWVacvCfhoOp9NvGgwE1UFJl1d7c';
        
        // Сохраняем имя пользователя
        const savedName = localStorage.getItem('syncwatch_user_name');
        if (savedName) userName = savedName;
        
        setTimeout(() => {
            const newName = prompt('Введите ваше имя:', userName);
            if (newName?.trim()) {
                userName = newName.trim();
                localStorage.setItem('syncwatch_user_name', userName);
            }
        }, 500);
        
        // ========== YOUTUBE ПЛЕЕР ==========
        function initYouTubePlayer(videoId) {
            if (player && typeof player.destroy === 'function') {
                player.destroy();
            }
            document.getElementById('player-wrapper').innerHTML = '<div id="player"></div>';
            
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    controls: 1,
                    autoplay: 0,
                    modestbranding: 1,
                    rel: 0,
                    enablejsapi: 1,
                    origin: window.location.origin
                },
                events: {
                    onReady: () => console.log('✅ YouTube плеер готов'),
                    onStateChange: (e) => {
                        if (isInternalAction) return;
                        if (!currentRoom || !socket) return;
                        const time = player.getCurrentTime();
                        if (e.data === YT.PlayerState.PLAYING) {
                            socket.emit('play-video', { roomId: currentRoom, time });
                        } else if (e.data === YT.PlayerState.PAUSED) {
                            socket.emit('pause-video', { roomId: currentRoom, time });
                        }
                    }
                }
            });
        }
        
        function controlYouTube(command, data) {
            if (!player) return;
            switch(command) {
                case 'play': player.playVideo(); break;
                case 'pause': player.pauseVideo(); break;
                case 'seek': player.seekTo(data, true); break;
                case 'change': player.loadVideoById(data); break;
            }
        }
        
        // ========== RUTUBE ПЛЕЕР ==========
        function initRutubePlayer(videoId) {
            const wrapper = document.getElementById('player-wrapper');
            wrapper.innerHTML = `
                <iframe 
                    id="rutube-player"
                    src="https://rutube.ru/play/embed/${videoId}/?api=1&autoplay=0"
                    width="100%"
                    height="100%"
                    frameborder="0"
                    allow="clipboard-write; autoplay"
                    allowfullscreen
                ></iframe>
            `;
            rutubeIframe = document.getElementById('rutube-player');
            
            window.removeEventListener('message', handleRutubeMessages);
            window.addEventListener('message', handleRutubeMessages);
        }
        
        function handleRutubeMessages(event) {
            if (event.origin !== 'https://rutube.ru') return;
            if (isInternalAction) return;
            
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'player:stateChanged' && currentRoom && socket) {
                    const isPlaying = data.data.state === 'playing';
                    const time = data.data.currentTime || 0;
                    if (isPlaying) {
                        socket.emit('play-video', { roomId: currentRoom, time });
                    } else if (data.data.state === 'paused') {
                        socket.emit('pause-video', { roomId: currentRoom, time });
                    }
                }
            } catch(e) {}
        }
        
        function sendToRutube(command, data = {}) {
            if (!rutubeIframe) return;
            rutubeIframe.contentWindow.postMessage(
                JSON.stringify({ type: `player:${command}`, data: data }),
                '*'
            );
        }
        
        function controlRutube(command, data) {
            switch(command) {
                case 'play': sendToRutube('play'); break;
                case 'pause': sendToRutube('pause'); break;
                case 'seek': sendToRutube('setCurrentTime', { time: data }); break;
                case 'change': 
                    const wrapper = document.getElementById('player-wrapper');
                    wrapper.innerHTML = `
                        <iframe 
                            id="rutube-player"
                            src="https://rutube.ru/play/embed/${data}/?api=1&autoplay=0"
                            width="100%" height="100%" frameborder="0" allow="clipboard-write; autoplay" allowfullscreen
                        ></iframe>
                    `;
                    rutubeIframe = document.getElementById('rutube-player');
                    break;
            }
        }
        
        // ========== VK VIDEO ПЛЕЕР ==========
        function initVKPlayer(videoId) {
            const wrapper = document.getElementById('player-wrapper');
            // Для VK нужно разобрать ID видео (owner_id и video_id)
            const [ownerId, vid] = videoId.split('_');
            wrapper.innerHTML = `
                <iframe 
                    id="vk-player"
                    src="https://vk.com/video_ext.php?oid=${ownerId}&id=${vid}&hd=2&js_api=1"
                    width="100%"
                    height="100%"
                    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
                    allowfullscreen
                ></iframe>
            `;
            
            // Загружаем VK API
            if (typeof VK === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://vk.com/js/api/videoplayer.js';
                script.onload = () => {
                    const iframe = document.getElementById('vk-player');
                    if (iframe) {
                        vkPlayer = VK.VideoPlayer(iframe);
                    }
                };
                document.head.appendChild(script);
            } else {
                const iframe = document.getElementById('vk-player');
                if (iframe) {
                    vkPlayer = VK.VideoPlayer(iframe);
                }
            }
        }
        
        function controlVK(command, data) {
            if (!vkPlayer) return;
            switch(command) {
                case 'play': vkPlayer.play(); break;
                case 'pause': vkPlayer.pause(); break;
                case 'seek': vkPlayer.seek(data); break;
            }
        }
        
        // ========== УНИВЕРСАЛЬНЫЕ ФУНКЦИИ ==========
        function initPlayer(platform, videoId) {
            isInternalAction = true;
            switch(platform) {
                case 'youtube':
                    initYouTubePlayer(videoId);
                    break;
                case 'rutube':
                    initRutubePlayer(videoId);
                    break;
                case 'vk':
                    initVKPlayer(videoId);
                    break;
            }
            setTimeout(() => { isInternalAction = false; }, 500);
        }
        
        function controlPlayer(command, data) {
            switch(currentPlatform) {
                case 'youtube': controlYouTube(command, data); break;
                case 'rutube': controlRutube(command, data); break;
                case 'vk': controlVK(command, data); break;
            }
        }
        
        function changePlatform(platform) {
            if (!isCreator) return;
            if (!currentRoom || !socket) return;
            
            currentPlatform = platform;
            let defaultVideoId = '';
            
            switch(platform) {
                case 'youtube': defaultVideoId = 'dQw4w9WgXcQ'; break;
                case 'rutube': defaultVideoId = 'b6e8a0f5c1e3a4f7b9d2c5e8f1a3b6c9'; break;
                case 'vk': defaultVideoId = '-123456_789012345'; break;
            }
            
            currentVideoId = defaultVideoId;
            initPlayer(platform, defaultVideoId);
            socket.emit('change-platform', { roomId: currentRoom, userId, platform, videoId: defaultVideoId });
            
            document.getElementById('btn-youtube').classList.remove('active');
            document.getElementById('btn-rutube').classList.remove('active');
            document.getElementById('btn-vk').classList.remove('active');
            document.getElementById(`btn-${platform}`).classList.add('active');
        }
        
        // ========== ПОИСК ВИДЕО ==========
        async function searchVideos() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            let results = [];
            
            if (currentPlatform === 'youtube') {
                try {
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`);
                    const data = await res.json();
                    results = data.items || [];
                } catch(e) {}
            } else if (currentPlatform === 'rutube') {
                // Rutube API
                try {
                    const res = await fetch(`https://rutube.ru/api/search/video/?query=${encodeURIComponent(query)}&format=json`);
                    const data = await res.json();
                    results = data.results || [];
                } catch(e) {}
            }
            
            displaySearchResults(results);
        }
        
        function displaySearchResults(videos) {
            const container = document.getElementById('searchResults');
            if (!videos || videos.length === 0) {
                container.innerHTML = '<div style="padding:20px;color:#888;">Ничего не найдено</div>';
                return;
            }
            
            container.innerHTML = videos.map(v => {
                let id, title, channel, thumb;
                
                if (currentPlatform === 'youtube') {
                    id = v.id.videoId;
                    title = v.snippet.title;
                    channel = v.snippet.channelTitle;
                    thumb = v.snippet.thumbnails.medium?.url;
                } else if (currentPlatform === 'rutube') {
                    id = v.video_id;
                    title = v.title;
                    channel = v.author_name;
                    thumb = v.thumbnail_url;
                }
                
                return `
                    <div class="video-item" onclick="selectVideo('${id}')">
                        <img class="video-thumb" src="${thumb}">
                        <div>
                            <div class="video-title">${escapeHtml(title)}</div>
                            <div class="video-channel">${escapeHtml(channel)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function selectVideo(videoId) {
            if (!isCreator) return;
            currentVideoId = videoId;
            controlPlayer('change', videoId);
            if (socket && currentRoom) {
                socket.emit('change-video', { roomId: currentRoom, videoId });
            }
        }
        
        // ========== QR-КОД ==========
        function generateQRCode(roomId) {
            const url = `${window.location.origin}?room=${roomId}`;
            const container = document.getElementById('qrCode');
            container.innerHTML = '';
            new QRCode(container, { text: url, width: 200, height: 200 });
            document.getElementById('roomLinkShort').innerText = url;
        }
        
        function showQRCode() {
            const container = document.getElementById('qrContainer');
            container.classList.toggle('show');
            if (!document.getElementById('qrCode').innerHTML && currentRoom) {
                generateQRCode(currentRoom);
            }
        }
        
        function downloadQR() {
            const canvas = document.querySelector('#qrCode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `room-${currentRoom}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        }
        
        // ========== SOCKET ==========
        function connectSocket() {
            socket = io(window.location.origin, {
                transports: ['polling', 'websocket']
            });
            
            socket.on('connect', () => {
                console.log('✅ Socket подключен');
                updateStatus(true, 'Подключено к серверу');
                if (currentRoom) {
                    socket.emit('join-room', { roomId: currentRoom, userId, userName });
                }
            });
            
            socket.on('disconnect', () => updateStatus(false, 'Потеряно соединение'));
            
            socket.on('room-state', (state) => {
                console.log('Состояние комнаты:', state);
                currentPlatform = state.platform;
                isCreator = state.isCreator;
                currentVideoId = state.videoId;
                
                if (isCreator) {
                    document.getElementById('platformSelector').style.display = 'block';
                    document.getElementById(`btn-${state.platform}`).classList.add('active');
                }
                
                initPlayer(state.platform, state.videoId);
                setTimeout(() => {
                    controlPlayer('seek', state.currentTime);
                    if (state.isPlaying) controlPlayer('play');
                }, 1000);
            });
            
            socket.on('platform-changed', ({ platform, videoId }) => {
                if (isCreator) return;
                currentPlatform = platform;
                currentVideoId = videoId;
                initPlayer(platform, videoId);
            });
            
            socket.on('video-play', () => {
                if (isInternalAction) return;
                controlPlayer('play');
            });
            
            socket.on('video-pause', () => {
                if (isInternalAction) return;
                controlPlayer('pause');
            });
            
            socket.on('video-seek', ({ time }) => {
                if (isInternalAction) return;
                controlPlayer('seek', time);
            });
            
            socket.on('video-changed', ({ videoId }) => {
                if (isInternalAction) return;
                currentVideoId = videoId;
                controlPlayer('change', videoId);
            });
            
            socket.on('users-list', ({ users, creatorId }) => {
                const container = document.getElementById('usersList');
                container.innerHTML = users.map(u => `
                    <span class="user-badge ${u.id === creatorId ? 'creator' : ''}">
                        ${escapeHtml(u.name)} ${u.id === creatorId ? '👑' : ''}
                    </span>
                `).join('');
                updateUserCount(users.length);
            });
            
            socket.on('user-joined', (data) => {
                addChatMessage('system', `${data.userName} присоединился`);
                updateUserCount(data.userCount);
            });
            
            socket.on('user-left', (data) => {
                addChatMessage('system', `${data.userName} покинул`);
                updateUserCount(data.userCount);
            });
            
            socket.on('chat-message', (data) => {
                addChatMessage(data.userName, data.message);
            });
        }
        
        // ========== КОМНАТЫ ==========
        function createRoom() {
            const roomId = Math.random().toString(36).substring(2, 10);
            document.getElementById('roomIdInput').value = roomId;
            joinRoom();
        }
        
        function joinRoom() {
            const roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) {
                alert('Введите ID комнаты');
                return;
            }
            
            currentRoom = roomId;
            
            if (!socket) {
                connectSocket();
                setTimeout(() => {
                    socket.emit('join-room', { roomId: currentRoom, userId, userName });
                }, 500);
            } else {
                socket.emit('join-room', { roomId: currentRoom, userId, userName });
            }
            
            document.getElementById('roomInfo').style.display = 'block';
            document.getElementById('currentRoomId').innerText = roomId;
            generateQRCode(roomId);
            addChatMessage('system', `Вы присоединились к комнате ${roomId}`);
        }
        
        function leaveRoom() {
            if (socket && currentRoom) {
                socket.emit('leave-room', { roomId: currentRoom, userId });
                currentRoom = null;
                isCreator = false;
                document.getElementById('roomInfo').style.display = 'none';
                document.getElementById('platformSelector').style.display = 'none';
                addChatMessage('system', 'Вы покинули комнату');
            }
        }
        
        function copyRoomLink() {
            const url = `${window.location.origin}?room=${currentRoom}`;
            navigator.clipboard.writeText(url);
            alert('Ссылка скопирована!');
        }
        
        function updateUserCount(count) {
            document.getElementById('userCount').innerText = count;
        }
        
        // ========== ЧАТ ==========
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !currentRoom || !socket) return;
            socket.emit('chat-message', { roomId: currentRoom, userName, message });
            addChatMessage(userName, message);
            input.value = '';
        }
        
        function addChatMessage(username, message) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message';
            if (username === 'system') {
                div.innerHTML = `<span class="text">🔔 ${escapeHtml(message)}</span>`;
                div.style.opacity = '0.7';
            } else {
                div.innerHTML = `<span class="username">${escapeHtml(username)}:</span> <span class="text">${escapeHtml(message)}</span>`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function updateStatus(connected, message) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            if (badge) {
                badge.className = `status-badge ${connected ? 'connected' : 'disconnected'}`;
            }
            if (text) {
                text.innerText = message;
            }
        }
        
        function toggleCollapsible(el) {
            el.classList.toggle('collapsed');
            const content = el.nextElementSibling;
            if (content) content.classList.toggle('collapsed');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ЗАПУСК ==========
        window.addEventListener('load', () => {
            connectSocket();
            
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                document.getElementById('roomIdInput').value = roomParam;
                setTimeout(() => joinRoom(), 1000);
            }
        });
        
        // YouTube API
        if (typeof YT !== 'undefined' && YT.Player) {
            console.log('YouTube API уже загружен');
        } else {
            window.onYouTubeIframeAPIReady = () => console.log('YouTube API готов');
        }
    </script>
</body>
</html>
