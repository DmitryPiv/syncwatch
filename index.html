<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SyncWatch - Совместный просмотр с голосовым чатом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .room-card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .room-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input, select {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff0000;
            background: #333;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
        }

        button.danger {
            background: linear-gradient(135deg, #666, #444);
        }

        button.mic-btn {
            padding: 10px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .room-info {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .room-link {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
        }

        .voice-chat {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .voice-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .participants {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .participant {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-section {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .videos-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .video-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .video-item:hover {
            transform: translateX(5px);
            background: #3a3a3a;
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            object-fit: cover;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .video-channel {
            font-size: 12px;
            color: #888;
        }

        .chat-container {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .chat-header {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 12px;
            animation: fadeIn 0.3s;
        }

        .message .username {
            color: #ff6b6b;
            font-weight: bold;
            margin-right: 8px;
        }

        .message .text {
            color: #ddd;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            margin: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-badge.connected {
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
            animation: pulse 2s infinite;
        }

        .status-badge.disconnected {
            background: #ff0000;
        }

        .sync-status {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }

        .collapsible {
            cursor: pointer;
            user-select: none;
        }

        .collapsible:after {
            content: ' ▼';
            font-size: 12px;
        }

        .collapsible.collapsed:after {
            content: ' ▶';
        }

        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-content.collapsed {
            max-height: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 SyncWatch</h1>
            <p>Смотрите YouTube вместе с друзьями в реальном времени + голосовой чат</p>
        </div>

        <div class="main-grid">
            <div class="left-column">
                <div class="room-card">
                    <div class="room-controls">
                        <input type="text" id="roomIdInput" placeholder="ID комнаты (например: movie-night)">
                        <button onclick="joinRoom()">🔗 Присоединиться</button>
                        <button onclick="createRoom()" class="secondary">✨ Создать комнату</button>
                    </div>
                    <div id="roomInfo" style="display: none;">
                        <div class="room-info">
                            <div><strong>🏠 Комната:</strong> <span id="currentRoomId"></span></div>
                            <div><strong>👥 Участники:</strong> <span id="userCount">1</span></div>
                            <button onclick="copyRoomLink()" class="secondary" style="margin-top: 10px;">📋 Скопировать ссылку</button>
                            <button onclick="leaveRoom()" class="danger" style="margin-top: 10px;">🚪 Выйти</button>
                            <div class="room-link" id="roomLink"></div>
                        </div>
                    </div>
                </div>

                <div class="voice-chat">
                    <div class="voice-controls">
                        <button id="micBtn" onclick="toggleMicrophone()" class="mic-btn secondary">🎤</button>
                        <button id="speakerBtn" onclick="toggleSpeaker()" class="mic-btn secondary">🔊</button>
                        <span id="voiceStatus" style="font-size: 12px; color: #888;">Микрофон выключен</span>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>🎙️ Участники голосового чата</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="participants" id="participants"></div>
                    </div>
                </div>

                <div class="player-container">
                    <div class="player-wrapper">
                        <div id="player"></div>
                    </div>
                </div>

                <div class="sync-status" id="syncStatus">
                    <span class="status-badge disconnected" id="statusBadge"></span>
                    <span id="statusText">Не подключено к серверу</span>
                </div>
            </div>

            <div class="right-column">
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск видео на YouTube..." onkeypress="if(event.key==='Enter') searchYouTube()">
                        <button onclick="searchYouTube()">🔍 Поиск</button>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>🔥 Популярные видео</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="popularVideos"></div>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)" style="margin-top: 15px;">
                        <strong>📺 Результаты поиска</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="searchResults"></div>
                    </div>
                </div>

                <div class="chat-container">
                    <div class="chat-header">
                        💬 Комнатный чат
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message">
                            <span class="text">💡 Подключитесь к комнате, чтобы начать общение</span>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let player = null;
        let socket = null;
        let currentRoom = null;
        let userId = null;
        let userName = null;
        let isSyncing = false;
        let syncInterval = null;
        
        // LiveKit переменные (пока отключены для простоты)
        let liveKitRoom = null;
        let isMicEnabled = false;
        let isSpeakerEnabled = true;
        
        // YouTube API ключ
        const YOUTUBE_API_KEY = 'AIzaSyD2U_rIWVacvCfhoOp9NvGgwE1UFJl1d7c';
        
        // Инициализация пользователя
        userId = localStorage.getItem('syncwatch_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('syncwatch_user_id', userId);
        }
        
        userName = localStorage.getItem('syncwatch_user_name');
        if (!userName) {
            userName = 'Аноним_' + Math.floor(Math.random() * 1000);
            localStorage.setItem('syncwatch_user_name', userName);
        }
        
        // ========== YOUTUBE API ==========
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'dQw4w9WgXcQ',
                playerVars: {
                    controls: 1,
                    autoplay: 0,
                    modestbranding: 1,
                    rel: 0,
                    enablejsapi: 1
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange
                }
            });
        }
        
        function onPlayerReady(event) {
            console.log('Player ready');
            player.setVolume(50);
            document.getElementById('syncStatus').innerHTML = '<span class="status-badge connected" id="statusBadge"></span><span id="statusText">Плеер готов</span>';
        }
        
        function onPlayerStateChange(event) {
            if (!currentRoom || !socket || isSyncing) return;
            const currentTime = player.getCurrentTime();
            
            if (event.data === YT.PlayerState.PLAYING) {
                socket.emit('play', { roomId: currentRoom, time: currentTime });
            } else if (event.data === YT.PlayerState.PAUSED) {
                socket.emit('pause', { roomId: currentRoom, time: currentTime });
            }
        }
        
        function changeVideo(videoId) {
            if (player && currentRoom && socket) {
                player.loadVideoById(videoId);
                socket.emit('video-change', { roomId: currentRoom, videoId: videoId });
            } else if (player) {
                player.loadVideoById(videoId);
            }
        }
        
        // ========== ПОИСК YOUTUBE ==========
        async function searchYouTube() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`);
                const data = await response.json();
                if (data.error) {
                    console.error('API Error:', data.error);
                    showDemoVideos('searchResults');
                } else {
                    displayVideos(data.items, 'searchResults');
                }
            } catch (error) {
                console.error('Ошибка поиска:', error);
                showDemoVideos('searchResults');
            }
        }
        
        async function loadPopularVideos() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&maxResults=20&regionCode=RU&key=${YOUTUBE_API_KEY}`);
                const data = await response.json();
                if (data.error) {
                    console.error('API Error:', data.error);
                    showDemoVideos('popularVideos');
                } else {
                    displayVideos(data.items, 'popularVideos');
                }
            } catch (error) {
                console.error('Ошибка загрузки популярных видео:', error);
                showDemoVideos('popularVideos');
            }
        }
        
        function displayVideos(videos, containerId) {
            const container = document.getElementById(containerId);
            if (!videos || videos.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: #888;">Видео не найдены</div>';
                return;
            }
            
            container.innerHTML = videos.map(video => {
                const videoId = video.id.videoId || video.id;
                const title = video.snippet.title;
                const channel = video.snippet.channelTitle;
                const thumb = video.snippet.thumbnails.medium.url;
                
                return `
                    <div class="video-item" onclick="changeVideo('${videoId}')">
                        <img class="video-thumb" src="${thumb}" alt="${title}">
                        <div class="video-info">
                            <div class="video-title">${escapeHtml(title)}</div>
                            <div class="video-channel">${escapeHtml(channel)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showDemoVideos(containerId) {
            const demos = [
                { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley' },
                { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi' },
                { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk ft. Bruno Mars', channel: 'Mark Ronson' }
            ];
            
            const container = document.getElementById(containerId);
            container.innerHTML = demos.map(video => `
                <div class="video-item" onclick="changeVideo('${video.id}')">
                    <img class="video-thumb" src="https://img.youtube.com/vi/${video.id}/mqdefault.jpg" alt="${video.title}">
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title)}</div>
                        <div class="video-channel">${escapeHtml(video.channel)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== ГОЛОСОВОЙ ЧАТ (упрощённый) ==========
        async function toggleMicrophone() {
            showVoiceMessage('Голосовой чат требует установки LiveKit сервера. Функция в разработке.');
        }
        
        function toggleSpeaker() {
            isSpeakerEnabled = !isSpeakerEnabled;
            document.getElementById('speakerBtn').style.background = isSpeakerEnabled ? 
                'linear-gradient(135deg, #00ff00, #00cc00)' : 'linear-gradient(135deg, #4a4a4a, #2a2a2a)';
        }
        
        function updateVoiceStatus(connected) {
            const status = document.getElementById('voiceStatus');
            if (connected) {
                status.innerHTML = '✅ Голосовой чат активен';
                status.style.color = '#00ff00';
            } else {
                status.innerHTML = '🎤 Голосовой чат (требуется LiveKit)';
                status.style.color = '#888';
            }
        }
        
        function showVoiceMessage(msg) {
            const status = document.getElementById('voiceStatus');
            status.innerHTML = msg;
            status.style.color = '#ffaa00';
            setTimeout(() => updateVoiceStatus(false), 3000);
        }
        
        function addVoiceParticipant(participant) {}
        function removeVoiceParticipant(identity) {}
        async function connectLiveKit(roomName) {}
        
        // ========== SOCKET.IO ==========
        function connectSocket() {
            socket = io(window.location.origin);
            
            socket.on('connect', () => {
                updateStatus(true, 'Подключено к серверу');
                if (currentRoom) joinRoomById(currentRoom);
            });
            
            socket.on('disconnect', () => updateStatus(false, 'Потеряно соединение с сервером'));
            
            socket.on('user-joined', (data) => {
                addChatMessage('system', `${data.userName} присоединился к комнате`);
                updateUserCount(data.userCount);
            });
            
            socket.on('user-left', (data) => {
                addChatMessage('system', `${data.userName} покинул комнату`);
                updateUserCount(data.userCount);
            });
            
            socket.on('chat-message', (data) => addChatMessage(data.userName, data.message));
            
            socket.on('play', (data) => {
                if (player && !isSyncing) {
                    isSyncing = true;
                    player.seekTo(data.time, true);
                    player.playVideo();
                    setTimeout(() => { isSyncing = false; }, 500);
                }
            });
            
            socket.on('pause', (data) => {
                if (player && !isSyncing) {
                    isSyncing = true;
                    player.seekTo(data.time, true);
                    player.pauseVideo();
                    setTimeout(() => { isSyncing = false; }, 500);
                }
            });
            
            socket.on('seek', (data) => {
                if (player && !isSyncing) {
                    isSyncing = true;
                    player.seekTo(data.time, true);
                    setTimeout(() => { isSyncing = false; }, 500);
                }
            });
            
            socket.on('sync-state', (data) => {
                if (player && !isSyncing) {
                    isSyncing = true;
                    player.seekTo(data.currentTime, true);
                    if (data.playing) player.playVideo();
                    else player.pauseVideo();
                    setTimeout(() => { isSyncing = false; }, 500);
                }
            });
            
            socket.on('video-change', (data) => {
                if (player && !isSyncing) {
                    isSyncing = true;
                    player.loadVideoById(data.videoId);
                    setTimeout(() => { isSyncing = false; }, 500);
                }
            });
        }
        
        // ========== УПРАВЛЕНИЕ КОМНАТАМИ ==========
        function createRoom() {
            const roomId = Math.random().toString(36).substring(2, 10);
            document.getElementById('roomIdInput').value = roomId;
            joinRoom();
        }
        
        function joinRoom() {
            const roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) {
                alert('Введите ID комнаты');
                return;
            }
            joinRoomById(roomId);
        }
        
        function joinRoomById(roomId) {
            if (!socket) {
                connectSocket();
                setTimeout(() => joinRoomById(roomId), 500);
                return;
            }
            
            currentRoom = roomId;
            socket.emit('join-room', { roomId, userId, userName });
            
            document.getElementById('roomInfo').style.display = 'block';
            document.getElementById('currentRoomId').innerText = roomId;
            const roomLink = `${window.location.origin}?room=${roomId}`;
            document.getElementById('roomLink').innerHTML = roomLink;
            
            addChatMessage('system', `Вы присоединились к комнате ${roomId}`);
            
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                if (player && currentRoom && socket?.connected) {
                    const state = player.getPlayerState();
                    socket.emit('sync-request', {
                        roomId: currentRoom,
                        time: player.getCurrentTime(),
                        playing: state === 1
                    });
                }
            }, 5000);
        }
        
        function leaveRoom() {
            if (socket && currentRoom) {
                socket.emit('leave-room', { roomId: currentRoom, userId });
                if (liveKitRoom) {
                    liveKitRoom.disconnect();
                    liveKitRoom = null;
                }
                currentRoom = null;
                document.getElementById('roomInfo').style.display = 'none';
                addChatMessage('system', 'Вы покинули комнату');
                if (syncInterval) clearInterval(syncInterval);
            }
        }
        
        function copyRoomLink() {
            const link = document.getElementById('roomLink').innerHTML;
            navigator.clipboard.writeText(link);
            alert('Ссылка скопирована!');
        }
        
        // ========== ЧАТ ==========
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !currentRoom || !socket) return;
            
            socket.emit('chat-message', { roomId: currentRoom, userId, userName, message });
            addChatMessage(userName, message);
            input.value = '';
        }
        
        function addChatMessage(username, message) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            if (username === 'system') {
                messageDiv.innerHTML = `<span class="text">🔔 ${escapeHtml(message)}</span>`;
                messageDiv.style.opacity = '0.7';
                messageDiv.style.fontStyle = 'italic';
            } else {
                messageDiv.innerHTML = `<span class="username">${escapeHtml(username)}:</span> <span class="text">${escapeHtml(message)}</span>`;
            }
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            while (messagesDiv.children.length > 100) {
                messagesDiv.removeChild(messagesDiv.firstChild);
            }
        }
        
        function updateUserCount(count) {
            document.getElementById('userCount').innerText = count;
        }
        
        function updateStatus(connected, message) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            if (badge) {
                badge.className = `status-badge ${connected ? 'connected' : 'disconnected'}`;
            }
            if (text) {
                text.innerText = message;
            }
        }
        
        function toggleCollapsible(element) {
            element.classList.toggle('collapsed');
            const content = element.nextElementSibling;
            if (content) {
                content.classList.toggle('collapsed');
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.addEventListener('load', () => {
            connectSocket();
            loadPopularVideos();
            
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                document.getElementById('roomIdInput').value = roomParam;
                setTimeout(() => joinRoom(), 1000);
            }
        });
        
        if (window.YT && window.YT.Player) {
            onYouTubeIframeAPIReady();
        } else {
            window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
        }
    </script>
</body>
</html>
