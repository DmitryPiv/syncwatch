<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SyncWatch - Совместный просмотр YouTube</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff0000, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p {
            color: #888;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        .room-card, .search-section, .chat-container {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .room-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #ff0000;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button.secondary {
            background: linear-gradient(135deg, #4a4a4a, #2a2a2a);
        }
        .room-info {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        .player-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }
        .player-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .videos-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .video-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-item:hover {
            transform: translateX(5px);
            background: #3a3a3a;
        }
        .video-thumb {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            object-fit: cover;
        }
        .video-title {
            font-size: 14px;
            font-weight: bold;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-channel {
            font-size: 12px;
            color: #888;
        }
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
        }
        .chat-header {
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }
        .message {
            margin-bottom: 12px;
        }
        .message .username {
            color: #ff6b6b;
            font-weight: bold;
        }
        .message .text {
            color: #ddd;
        }
        .chat-input-area {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .sync-status {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
            margin-top: 20px;
        }
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-badge.connected {
            background: #00ff00;
            animation: pulse 1s infinite;
        }
        .status-badge.disconnected {
            background: #ff0000;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .users-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .user-badge {
            background: #ff0000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .user-badge.creator {
            background: #ffaa00;
            color: #000;
        }
        .qr-container {
            background: white;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .qr-container.show {
            display: block;
        }
        .qr-code canvas {
            width: 200px;
            height: 200px;
            margin: 10px auto;
        }
        .collapsible {
            cursor: pointer;
            margin-bottom: 10px;
        }
        .collapsible:after {
            content: ' ▼';
            font-size: 12px;
        }
        .collapsible.collapsed:after {
            content: ' ▶';
        }
        .collapsible-content {
            max-height: 1000px;
            overflow: hidden;
            transition: max-height 0.3s;
        }
        .collapsible-content.collapsed {
            max-height: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 SyncWatch</h1>
            <p>Смотрите YouTube вместе с друзьями в реальном времени</p>
        </div>

        <div class="main-grid">
            <div class="left-column">
                <div class="room-card">
                    <div class="room-controls">
                        <input type="text" id="roomIdInput" placeholder="ID комнаты (например: movie-night)">
                        <button onclick="joinRoom()">🔗 Присоединиться</button>
                        <button onclick="createRoom()" class="secondary">✨ Создать комнату</button>
                    </div>
                    <div id="roomInfo" style="display: none;">
                        <div class="room-info">
                            <div style="display: flex; justify-content: space-between;">
                                <div><strong>🏠 Комната:</strong> <span id="currentRoomId"></span></div>
                                <div><strong>👥 Участники:</strong> <span id="userCount">1</span></div>
                            </div>
                            <div class="users-list" id="usersList"></div>
                            
                            <div class="qr-container" id="qrContainer">
                                <div>📱 Отсканируйте QR-код для входа</div>
                                <div class="qr-code" id="qrCode"></div>
                                <button onclick="downloadQR()" class="secondary">💾 Скачать QR</button>
                                <div style="font-size: 11px; margin-top: 10px;">Ссылка: <span id="roomLinkShort"></span></div>
                            </div>
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button onclick="showQRCode()" class="secondary">📱 QR-код</button>
                                <button onclick="copyRoomLink()" class="secondary">📋 Скопировать ссылку</button>
                                <button onclick="leaveRoom()" class="secondary">🚪 Выйти</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="player-container">
                    <div class="player-wrapper">
                        <div id="player"></div>
                    </div>
                </div>

                <div class="sync-status" id="syncStatus">
                    <span class="status-badge disconnected" id="statusBadge"></span>
                    <span id="statusText">Подключение...</span>
                </div>
            </div>

            <div class="right-column">
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск видео на YouTube..." onkeypress="if(event.key==='Enter') searchYouTube()">
                        <button onclick="searchYouTube()">🔍 Поиск</button>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>🔥 Популярные видео</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="popularVideos"></div>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>📺 Результаты поиска</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="searchResults"></div>
                    </div>
                </div>

                <div class="chat-container">
                    <div class="chat-header">💬 Текстовый чат</div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message"><span class="text">💡 Подключитесь к комнате, чтобы начать общение</span></div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script>
        // ========== ПЕРЕМЕННЫЕ ==========
        let player = null;
        let socket = null;
        let currentRoom = null;
        let userId = null;
        let userName = null;
        let isInternalAction = false;
        let isCreator = false;
        let playerReady = false;
        let pendingSync = null;
        
        const YOUTUBE_API_KEY = 'AIzaSyD2U_rIWVacvCfhoOp9NvGgwE1UFJl1d7c';
        
        // Инициализация пользователя
        userId = localStorage.getItem('syncwatch_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('syncwatch_user_id', userId);
        }
        
        userName = localStorage.getItem('syncwatch_user_name');
        if (!userName) {
            userName = 'Аноним_' + Math.floor(Math.random() * 1000);
            localStorage.setItem('syncwatch_user_name', userName);
        }
        
        setTimeout(() => {
            const newName = prompt('Введите ваше имя:', userName);
            if (newName && newName.trim()) {
                userName = newName.trim();
                localStorage.setItem('syncwatch_user_name', userName);
            }
        }, 500);
        
        // ========== YOUTUBE PLAYER ==========
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'dQw4w9WgXcQ',
                playerVars: {
                    controls: 1,
                    autoplay: 0,
                    modestbranding: 1,
                    rel: 0,
                    enablejsapi: 1,
                    origin: window.location.origin
                },
                events: {
                    onReady: function(event) {
                        console.log('✅ Плеер готов');
                        playerReady = true;
                        updateStatus(true, 'Плеер готов');
                        
                        // Применяем ожидающую синхронизацию
                        if (pendingSync) {
                            applySync(pendingSync);
                            pendingSync = null;
                        }
                    },
                    onStateChange: function(event) {
                        if (isInternalAction) return;
                        if (!currentRoom || !socket) return;
                        
                        const time = player.getCurrentTime();
                        
                        if (event.data === YT.PlayerState.PLAYING) {
                            console.log('▶️ Воспроизведение');
                            socket.emit('play-video', { roomId: currentRoom, time });
                        } else if (event.data === YT.PlayerState.PAUSED) {
                            console.log('⏸️ Пауза');
                            socket.emit('pause-video', { roomId: currentRoom, time });
                        }
                    }
                }
            });
        }
        
        function applySync(state) {
            if (!player || !playerReady) {
                pendingSync = state;
                return;
            }
            
            console.log('Применяем синхронизацию:', state);
            isInternalAction = true;
            
            // Загружаем видео если нужно
            if (player.getVideoData().video_id !== state.videoId) {
                player.loadVideoById(state.videoId);
            }
            
            // Устанавливаем время
            player.seekTo(state.currentTime, true);
            
            // Запускаем или останавливаем воспроизведение
            if (state.isPlaying) {
                setTimeout(() => {
                    player.playVideo();
                }, 100);
            } else {
                player.pauseVideo();
            }
            
            setTimeout(() => { isInternalAction = false; }, 500);
        }
        
        function changeVideo(videoId) {
            if (!player) return;
            isInternalAction = true;
            player.loadVideoById(videoId);
            setTimeout(() => { isInternalAction = false; }, 500);
            
            if (currentRoom && socket) {
                socket.emit('change-video', { roomId: currentRoom, videoId });
            }
        }
        
        // ========== ПОИСК YOUTUBE ==========
        async function searchYouTube() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=15&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`);
                const data = await response.json();
                if (data.error) {
                    showDemoVideos('searchResults');
                } else {
                    displayVideos(data.items, 'searchResults');
                }
            } catch(e) {
                showDemoVideos('searchResults');
            }
        }
        
        async function loadPopularVideos() {
            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&maxResults=15&regionCode=RU&key=${YOUTUBE_API_KEY}`);
                const data = await response.json();
                if (data.error) {
                    showDemoVideos('popularVideos');
                } else {
                    displayVideos(data.items, 'popularVideos');
                }
            } catch(e) {
                showDemoVideos('popularVideos');
            }
        }
        
        function displayVideos(videos, containerId) {
            const container = document.getElementById(containerId);
            if (!videos || videos.length === 0) {
                container.innerHTML = '<div style="padding:20px;color:#888;">Видео не найдены</div>';
                return;
            }
            
            container.innerHTML = videos.map(video => {
                const videoId = video.id.videoId || video.id;
                const title = video.snippet.title;
                const channel = video.snippet.channelTitle;
                const thumb = video.snippet.thumbnails?.medium?.url || `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
                
                return `
                    <div class="video-item" onclick="changeVideo('${videoId}')">
                        <img class="video-thumb" src="${thumb}">
                        <div>
                            <div class="video-title">${escapeHtml(title)}</div>
                            <div class="video-channel">${escapeHtml(channel)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showDemoVideos(containerId) {
            const demos = [
                { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley' },
                { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito ft. Daddy Yankee', channel: 'Luis Fonsi' },
                { id: 'OPf0YbXqDm0', title: 'Mark Ronson - Uptown Funk ft. Bruno Mars', channel: 'Mark Ronson' }
            ];
            
            const container = document.getElementById(containerId);
            container.innerHTML = demos.map(video => `
                <div class="video-item" onclick="changeVideo('${video.id}')">
                    <img class="video-thumb" src="https://img.youtube.com/vi/${video.id}/mqdefault.jpg">
                    <div>
                        <div class="video-title">${escapeHtml(video.title)}</div>
                        <div class="video-channel">${escapeHtml(video.channel)}</div>
                    </div>
                </div>
            `).join('');
        }
        
        // ========== QR-КОД ==========
        function generateQRCode(roomId) {
            const url = `${window.location.origin}?room=${roomId}`;
            const container = document.getElementById('qrCode');
            container.innerHTML = '';
            new QRCode(container, { text: url, width: 200, height: 200 });
            document.getElementById('roomLinkShort').innerText = url;
        }
        
        function showQRCode() {
            const container = document.getElementById('qrContainer');
            container.classList.toggle('show');
            if (!document.getElementById('qrCode').innerHTML && currentRoom) {
                generateQRCode(currentRoom);
            }
        }
        
        function downloadQR() {
            const canvas = document.querySelector('#qrCode canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `room-${currentRoom}.png`;
                link.href = canvas.toDataURL();
                link.click();
            }
        }
        
        // ========== SOCKET ==========
        function connectSocket() {
            socket = io(window.location.origin, {
                transports: ['polling', 'websocket']
            });
            
            socket.on('connect', () => {
                console.log('✅ Socket подключен');
                updateStatus(true, 'Подключено к серверу');
                if (currentRoom) {
                    socket.emit('join-room', { roomId: currentRoom, userId, userName });
                }
            });
            
            socket.on('disconnect', () => {
                updateStatus(false, 'Потеряно соединение');
            });
            
            socket.on('room-state', (state) => {
                console.log('Получено состояние комнаты:', state);
                isCreator = state.isCreator;
                applySync(state);
            });
            
            socket.on('video-play', ({ time }) => {
                if (!player || isInternalAction) return;
                console.log('▶️ Синхронизация: воспроизведение');
                isInternalAction = true;
                player.playVideo();
                setTimeout(() => { isInternalAction = false; }, 200);
            });
            
            socket.on('video-pause', ({ time }) => {
                if (!player || isInternalAction) return;
                console.log('⏸️ Синхронизация: пауза');
                isInternalAction = true;
                player.pauseVideo();
                setTimeout(() => { isInternalAction = false; }, 200);
            });
            
            socket.on('video-seek', ({ time }) => {
                if (!player || isInternalAction) return;
                console.log('⏩ Синхронизация: перемотка на', time);
                isInternalAction = true;
                player.seekTo(time, true);
                setTimeout(() => { isInternalAction = false; }, 200);
            });
            
            socket.on('video-changed', ({ videoId }) => {
                if (!player || isInternalAction) return;
                console.log('🎬 Синхронизация: смена видео на', videoId);
                isInternalAction = true;
                player.loadVideoById(videoId);
                setTimeout(() => { isInternalAction = false; }, 500);
            });
            
            socket.on('users-list', ({ users, creatorId }) => {
                const container = document.getElementById('usersList');
                container.innerHTML = users.map(u => `
                    <span class="user-badge ${u.id === creatorId ? 'creator' : ''}">
                        ${escapeHtml(u.name)} ${u.id === creatorId ? '👑' : ''}
                    </span>
                `).join('');
                updateUserCount(users.length);
            });
            
            socket.on('user-joined', (data) => {
                addChatMessage('system', `${data.userName} присоединился`);
                updateUserCount(data.userCount);
            });
            
            socket.on('user-left', (data) => {
                addChatMessage('system', `${data.userName} покинул`);
                updateUserCount(data.userCount);
            });
            
            socket.on('chat-message', (data) => {
                addChatMessage(data.userName, data.message);
            });
        }
        
        // ========== КОМНАТЫ ==========
        function createRoom() {
            const roomId = Math.random().toString(36).substring(2, 10);
            document.getElementById('roomIdInput').value = roomId;
            joinRoom();
        }
        
        function joinRoom() {
            const roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) {
                alert('Введите ID комнаты');
                return;
            }
            
            currentRoom = roomId;
            
            if (!socket) {
                connectSocket();
                setTimeout(() => {
                    socket.emit('join-room', { roomId: currentRoom, userId, userName });
                }, 500);
            } else {
                socket.emit('join-room', { roomId: currentRoom, userId, userName });
            }
            
            document.getElementById('roomInfo').style.display = 'block';
            document.getElementById('currentRoomId').innerText = roomId;
            generateQRCode(roomId);
            addChatMessage('system', `Вы присоединились к комнате ${roomId}`);
        }
        
        function leaveRoom() {
            if (socket && currentRoom) {
                socket.emit('leave-room', { roomId: currentRoom, userId });
                currentRoom = null;
                document.getElementById('roomInfo').style.display = 'none';
                addChatMessage('system', 'Вы покинули комнату');
            }
        }
        
        function copyRoomLink() {
            const url = `${window.location.origin}?room=${currentRoom}`;
            navigator.clipboard.writeText(url);
            alert('Ссылка скопирована!');
        }
        
        function updateUserCount(count) {
            document.getElementById('userCount').innerText = count;
        }
        
        // ========== ЧАТ ==========
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !currentRoom || !socket) return;
            socket.emit('chat-message', { roomId: currentRoom, userName, message });
            addChatMessage(userName, message);
            input.value = '';
        }
        
        function addChatMessage(username, message) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message';
            if (username === 'system') {
                div.innerHTML = `<span class="text">🔔 ${escapeHtml(message)}</span>`;
                div.style.opacity = '0.7';
            } else {
                div.innerHTML = `<span class="username">${escapeHtml(username)}:</span> <span class="text">${escapeHtml(message)}</span>`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function updateStatus(connected, message) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            if (badge) {
                badge.className = `status-badge ${connected ? 'connected' : 'disconnected'}`;
            }
            if (text) {
                text.innerText = message;
            }
        }
        
        function toggleCollapsible(el) {
            el.classList.toggle('collapsed');
            const content = el.nextElementSibling;
            if (content) content.classList.toggle('collapsed');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ЗАПУСК ==========
        window.addEventListener('load', () => {
            connectSocket();
            loadPopularVideos();
            
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                document.getElementById('roomIdInput').value = roomParam;
                setTimeout(() => joinRoom(), 1000);
            }
        });
        
        // Ждём YouTube API
        if (typeof YT !== 'undefined' && YT.Player) {
            onYouTubeIframeAPIReady();
        } else {
            window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
        }
    </script>
