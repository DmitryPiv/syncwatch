<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SyncWatch - Совместный просмотр</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0f0f0f, #1a1a1a); min-height: 100vh; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2rem; background: linear-gradient(135deg, #ff0000, #ff6b6b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
        .room-card, .search-section, .chat-container { background: rgba(30,30,30,0.8); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .room-controls { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        input { flex: 1; padding: 12px 16px; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 12px; color: white; }
        button { padding: 12px 24px; background: linear-gradient(135deg, #ff0000, #cc0000); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button.secondary { background: linear-gradient(135deg, #4a4a4a, #2a2a2a); }
        .room-info { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-top: 15px; }
        .qr-container { background: white; border-radius: 16px; padding: 15px; text-align: center; margin-top: 15px; display: none; }
        .qr-container.show { display: block; }
        .qr-code canvas { width: 200px; height: 200px; margin: 10px auto; }
        .player-container { background: #000; border-radius: 16px; overflow: hidden; }
        .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .videos-list { max-height: 400px; overflow-y: auto; }
        .video-item { display: flex; gap: 10px; padding: 10px; background: #2a2a2a; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: transform 0.2s; }
        .video-item:hover { transform: translateX(5px); background: #3a3a3a; }
        .video-thumb { width: 120px; height: 68px; border-radius: 8px; object-fit: cover; }
        .video-title { font-size: 14px; font-weight: bold; }
        .video-channel { font-size: 12px; color: #888; }
        .chat-container { display: flex; flex-direction: column; height: 400px; }
        .chat-header { padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px 0; }
        .message { margin-bottom: 12px; }
        .message .username { color: #ff6b6b; font-weight: bold; }
        .chat-input-area { display: flex; gap: 10px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .sync-status { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; font-size: 12px; text-align: center; margin-top: 20px; }
        .status-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-badge.connected { background: #00ff00; animation: pulse 1s infinite; }
        .status-badge.disconnected { background: #ff0000; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .users-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .user-badge { background: #ff0000; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .collapsible { cursor: pointer; margin-bottom: 10px; }
        .collapsible:after { content: ' ▼'; font-size: 12px; }
        .collapsible.collapsed:after { content: ' ▶'; }
        .collapsible-content { max-height: 1000px; overflow: hidden; transition: max-height 0.3s; }
        .collapsible-content.collapsed { max-height: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 SyncWatch</h1>
            <p>Смотрите YouTube вместе с друзьями</p>
        </div>

        <div class="main-grid">
            <div class="left-column">
                <div class="room-card">
                    <div class="room-controls">
                        <input type="text" id="roomIdInput" placeholder="ID комнаты">
                        <button onclick="joinRoom()">🔗 Присоединиться</button>
                        <button onclick="createRoom()" class="secondary">✨ Создать комнату</button>
                    </div>
                    <div id="roomInfo" style="display: none;">
                        <div class="room-info">
                            <div style="display: flex; justify-content: space-between;">
                                <div><strong>🏠 Комната:</strong> <span id="currentRoomId"></span></div>
                                <div><strong>👥 Участники:</strong> <span id="userCount">1</span></div>
                            </div>
                            <div class="users-list" id="usersList"></div>
                            <div class="qr-container" id="qrContainer">
                                <div>📱 Отсканируйте QR-код</div>
                                <div class="qr-code" id="qrCode"></div>
                                <button onclick="downloadQR()" class="secondary">💾 Скачать QR</button>
                                <div style="font-size: 11px; margin-top: 10px;">Ссылка: <span id="roomLinkShort"></span></div>
                            </div>
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button onclick="showQRCode()" class="secondary">📱 QR-код</button>
                                <button onclick="copyRoomLink()" class="secondary">📋 Ссылка</button>
                                <button onclick="leaveRoom()" class="secondary">🚪 Выйти</button>
                            </div>
                            <div class="room-link" id="roomLink" style="display: none;"></div>
                        </div>
                    </div>
                </div>

                <div class="player-container">
                    <div class="player-wrapper">
                        <div id="player"></div>
                    </div>
                </div>

                <div class="sync-status" id="syncStatus">
                    <span class="status-badge disconnected" id="statusBadge"></span>
                    <span id="statusText">Подключение...</span>
                </div>
            </div>

            <div class="right-column">
                <div class="search-section">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск на YouTube..." onkeypress="if(event.key==='Enter') searchYouTube()">
                        <button onclick="searchYouTube()">🔍 Поиск</button>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>🔥 Популярные видео</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="popularVideos"></div>
                    </div>
                    <div class="collapsible" onclick="toggleCollapsible(this)">
                        <strong>📺 Результаты поиска</strong>
                    </div>
                    <div class="collapsible-content">
                        <div class="videos-list" id="searchResults"></div>
                    </div>
                </div>

                <div class="chat-container">
                    <div class="chat-header">💬 Чат</div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message"><span class="text">💡 Подключитесь к комнате</span></div>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <script>
        // ========== ПЕРЕМЕННЫЕ ==========
        let player = null;
        let socket = null;
        let currentRoom = null;
        let userId = null;
        let userName = null;
        let isInternalAction = false; // Защита от зацикливания
        let syncInterval = null;
        let currentQRCode = null;
        
        const YOUTUBE_API_KEY = 'AIzaSyD2U_rIWVacvCfhoOp9NvGgwE1UFJl1d7c';
        
        // Инициализация пользователя
        userId = localStorage.getItem('syncwatch_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('syncwatch_user_id', userId);
        }
        
        userName = localStorage.getItem('syncwatch_user_name');
        if (!userName) {
            userName = 'Аноним_' + Math.floor(Math.random() * 1000);
            localStorage.setItem('syncwatch_user_name', userName);
        }
        
        setTimeout(() => {
            const newName = prompt('Введите ваше имя:', userName);
            if (newName?.trim()) {
                userName = newName.trim();
                localStorage.setItem('syncwatch_user_name', userName);
            }
        }, 500);
        
        // ========== YOUTUBE PLAYER ==========
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'dQw4w9WgXcQ',
                playerVars: { controls: 1, autoplay: 0, modestbranding: 1, rel: 0, enablejsapi: 1 },
                events: {
                    onReady: () => console.log('✅ Player ready'),
                    onStateChange: onPlayerStateChange
                }
            });
        }
        
        function onPlayerStateChange(event) {
            // Игнорируем если действие вызвано синхронизацией
            if (isInternalAction) return;
            if (!currentRoom || !socket) return;
            
            const currentTime = player.getCurrentTime();
            
            if (event.data === YT.PlayerState.PLAYING) {
                console.log('📤 Emit play at', currentTime);
                socket.emit('play-video', { roomId: currentRoom, time: currentTime });
            } else if (event.data === YT.PlayerState.PAUSED) {
                console.log('📤 Emit pause at', currentTime);
                socket.emit('pause-video', { roomId: currentRoom, time: currentTime });
            }
        }
        
        function changeVideo(videoId) {
            if (!player) return;
            
            isInternalAction = true;
            player.loadVideoById(videoId);
            setTimeout(() => { isInternalAction = false; }, 500);
            
            if (currentRoom && socket) {
                socket.emit('change-video', { roomId: currentRoom, videoId });
            }
        }
        
        // ========== ПОИСК YOUTUBE ==========
        async function searchYouTube() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=20&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`);
                const data = await res.json();
                if (data.error) showDemoVideos('searchResults');
                else displayVideos(data.items, 'searchResults');
            } catch(e) { showDemoVideos('searchResults'); }
        }
        
        async function loadPopularVideos() {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&chart=mostPopular&maxResults=20&regionCode=RU&key=${YOUTUBE_API_KEY}`);
                const data = await res.json();
                if (data.error) showDemoVideos('popularVideos');
                else displayVideos(data.items, 'popularVideos');
            } catch(e) { showDemoVideos('popularVideos'); }
        }
        
        function displayVideos(videos, containerId) {
            const container = document.getElementById(containerId);
            if (!videos?.length) { container.innerHTML = '<div style="padding:20px;color:#888;">Нет видео</div>'; return; }
            container.innerHTML = videos.map(v => {
                const id = v.id.videoId || v.id;
                const title = v.snippet.title;
                const channel = v.snippet.channelTitle;
                const thumb = v.snippet.thumbnails?.medium?.url || `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
                return `<div class="video-item" onclick="changeVideo('${id}')">
                    <img class="video-thumb" src="${thumb}">
                    <div><div class="video-title">${escapeHtml(title)}</div><div class="video-channel">${escapeHtml(channel)}</div></div>
                </div>`;
            }).join('');
        }
        
        function showDemoVideos(containerId) {
            const demos = [
                { id: 'dQw4w9WgXcQ', title: 'Rick Astley - Never Gonna Give You Up', channel: 'Rick Astley' },
                { id: 'kJQP7kiw5Fk', title: 'Luis Fonsi - Despacito', channel: 'Luis Fonsi' }
            ];
            document.getElementById(containerId).innerHTML = demos.map(v => `
                <div class="video-item" onclick="changeVideo('${v.id}')">
                    <img class="video-thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
                    <div><div class="video-title">${escapeHtml(v.title)}</div><div class="video-channel">${escapeHtml(v.channel)}</div></div>
                </div>
            `).join('');
        }
        
        // ========== QR-КОД ==========
        function generateQRCode(roomId) {
            const url = `${window.location.origin}?room=${roomId}`;
            const container = document.getElementById('qrCode');
            container.innerHTML = '';
            new QRCode(container, { text: url, width: 200, height: 200 });
            document.getElementById('roomLinkShort').innerText = url;
        }
        
        function showQRCode() {
            const container = document.getElementById('qrContainer');
            container.classList.toggle('show');
            if (!document.getElementById('qrCode').innerHTML && currentRoom) generateQRCode(currentRoom);
        }
        
        function downloadQR() {
            const canvas = document.querySelector('#qrCode canvas');
            if (canvas) { const link = document.createElement('a'); link.download = `room-${currentRoom}.png`; link.href = canvas.toDataURL(); link.click(); }
        }
        
        // ========== SOCKET CONNECTION ==========
        function connectSocket() {
            socket = io(window.location.origin, {
                transports: ['polling', 'websocket'],
                reconnection: true
            });
            
            socket.on('connect', () => {
                console.log('✅ Socket connected');
                updateStatus(true, 'Подключено к серверу');
                if (currentRoom) rejoinRoom();
            });
            
            socket.on('disconnect', () => updateStatus(false, 'Потеряно соединение'));
            
            // Получение состояния комнаты при входе
            socket.on('room-state', (state) => {
                console.log('📥 Received room state:', state);
                if (!player) return;
                
                isInternalAction = true;
                if (player.getVideoData().video_id !== state.videoId) {
                    player.loadVideoById(state.videoId);
                }
                player.seekTo(state.currentTime, true);
                if (state.isPlaying) {
                    player.playVideo();
                } else {
                    player.pauseVideo();
                }
                setTimeout(() => { isInternalAction = false; }, 500);
            });
            
            // Смена видео
            socket.on('video-changed', ({ videoId }) => {
                console.log('📥 Video changed to:', videoId);
                if (!player) return;
                isInternalAction = true;
                player.loadVideoById(videoId);
                setTimeout(() => { isInternalAction = false; }, 500);
            });
            
            // Воспроизведение (без перемотки)
            socket.on('video-play', ({ time }) => {
                if (!player || isInternalAction) return;
                console.log('📥 Play event at', time);
                
                const currentTime = player.getCurrentTime();
                const diff = Math.abs(currentTime - time);
                
                isInternalAction = true;
                if (diff > 2) {
                    player.seekTo(time, true);
                }
                player.playVideo();
                setTimeout(() => { isInternalAction = false; }, 200);
            });
            
            // Пауза
            socket.on('video-pause', ({ time }) => {
                if (!player || isInternalAction) return;
                console.log('📥 Pause event at', time);
                
                const currentTime = player.getCurrentTime();
                const diff = Math.abs(currentTime - time);
                
                isInternalAction = true;
                if (diff > 2) {
                    player.seekTo(time, true);
                }
                player.pauseVideo();
                setTimeout(() => { isInternalAction = false; }, 200);
            });
            
            // Перемотка
            socket.on('video-seek', ({ time }) => {
                if (!player || isInternalAction) return;
                console.log('📥 Seek event to', time);
                
                isInternalAction = true;
                player.seekTo(time, true);
                setTimeout(() => { isInternalAction = false; }, 200);
            });
            
            // Ответ на запрос синхронизации
            socket.on('sync-response', ({ time, isPlaying, videoId }) => {
                if (!player || isInternalAction) return;
                console.log('📥 Sync response:', { time, isPlaying });
                
                isInternalAction = true;
                if (videoId && player.getVideoData().video_id !== videoId) {
                    player.loadVideoById(videoId);
                }
                player.seekTo(time, true);
                if (isPlaying && player.getPlayerState() !== 1) {
                    player.playVideo();
                } else if (!isPlaying && player.getPlayerState() === 1) {
                    player.pauseVideo();
                }
                setTimeout(() => { isInternalAction = false; }, 500);
            });
            
            // Пользователи
            socket.on('user-joined', (data) => {
                addChatMessage('system', `${data.userName} присоединился`);
                updateUserCount(data.userCount);
            });
            
            socket.on('user-left', (data) => {
                addChatMessage('system', `${data.userName} покинул`);
                updateUserCount(data.userCount);
            });
            
            socket.on('chat-message', (data) => {
                addChatMessage(data.userName, data.message);
            });
        }
        
        function rejoinRoom() {
            if (currentRoom) {
                socket.emit('join-room', { roomId: currentRoom, userId, userName });
            }
        }
        
        // ========== КОМНАТЫ ==========
        function createRoom() {
            const roomId = Math.random().toString(36).substring(2, 10);
            document.getElementById('roomIdInput').value = roomId;
            joinRoom();
        }
        
        function joinRoom() {
            const roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) { alert('Введите ID комнаты'); return; }
            
            if (!socket) {
                connectSocket();
                setTimeout(() => joinRoomById(roomId), 500);
            } else {
                joinRoomById(roomId);
            }
        }
        
        function joinRoomById(roomId) {
            currentRoom = roomId;
            socket.emit('join-room', { roomId, userId, userName });
            
            document.getElementById('roomInfo').style.display = 'block';
            document.getElementById('currentRoomId').innerText = roomId;
            const roomUrl = `${window.location.origin}?room=${roomId}`;
            document.getElementById('roomLink').innerHTML = roomUrl;
            generateQRCode(roomId);
            addChatMessage('system', `Вы присоединились к комнате ${roomId}`);
            
            // Запускаем периодическую синхронизацию (раз в 15 секунд)
            if (syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => {
                if (player && currentRoom && socket && !isInternalAction) {
                    const time = player.getCurrentTime();
                    const isPlaying = player.getPlayerState() === 1;
                    socket.emit('request-sync', { roomId: currentRoom, clientTime: time, isPlaying });
                }
            }, 15000);
        }
        
        function leaveRoom() {
            if (socket && currentRoom) {
                socket.emit('leave-room', { roomId: currentRoom, userId });
                currentRoom = null;
                document.getElementById('roomInfo').style.display = 'none';
                addChatMessage('system', 'Вы покинули комнату');
                if (syncInterval) clearInterval(syncInterval);
            }
        }
        
        function copyRoomLink() {
            const link = document.getElementById('roomLink').innerHTML;
            navigator.clipboard.writeText(link);
            alert('Ссылка скопирована!');
        }
        
        function updateUserCount(count) {
            document.getElementById('userCount').innerText = count;
        }
        
        // ========== ЧАТ ==========
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !currentRoom || !socket) return;
            socket.emit('chat-message', { roomId: currentRoom, userName, message });
            addChatMessage(userName, message);
            input.value = '';
        }
        
        function addChatMessage(username, message) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message';
            if (username === 'system') {
                div.innerHTML = `<span class="text">🔔 ${escapeHtml(message)}</span>`;
                div.style.opacity = '0.7';
            } else {
                div.innerHTML = `<span class="username">${escapeHtml(username)}:</span> <span class="text">${escapeHtml(message)}</span>`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            while (container.children.length > 100) container.removeChild(container.firstChild);
        }
        
        function updateStatus(connected, message) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            if (badge) badge.className = `status-badge ${connected ? 'connected' : 'disconnected'}`;
            if (text) text.innerText = message;
        }
        
        function toggleCollapsible(el) {
            el.classList.toggle('collapsed');
            el.nextElementSibling.classList.toggle('collapsed');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== ЗАПУСК ==========
        window.addEventListener('load', () => {
            connectSocket();
            loadPopularVideos();
            
            const urlParams = new URLSearchParams(window.location.search);
            const roomParam = urlParams.get('room');
            if (roomParam) {
                document.getElementById('roomIdInput').value = roomParam;
                setTimeout(() => joinRoom(), 1000);
            }
        });
        
        if (window.YT?.Player) onYouTubeIframeAPIReady();
        else window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    </script>
</body>
</html>
